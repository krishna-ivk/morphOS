{
  "name": "feature_pipeline",
  "steps": [
    {
      "id": "interpret_vision",
      "type": "agent",
      "agent": "vision_agent",
      "contracts": [
        {
          "name": "feature_plan",
          "path": "${artifacts_dir}/feature_plan.json",
          "kind": "json_schema",
          "schema_name": "FeaturePlan"
        }
      ]
    },
    {
      "id": "build_execution_plan",
      "type": "agent",
      "agent": "planning_agent",
      "contracts": [
        {
          "name": "task_list",
          "path": "${artifacts_dir}/tasks.json",
          "kind": "json_schema",
          "schema_name": "TaskList"
        },
        {
          "name": "execution_plan",
          "path": "${artifacts_dir}/execution_plan.json",
          "kind": "file_exists"
        }
      ]
    },
    {
      "id": "review_execution_plan",
      "type": "agent",
      "agent": "reviewer_agent",
      "contracts": [
        {
          "name": "plan_review",
          "path": "${artifacts_dir}/plan_review.json",
          "kind": "file_exists"
        }
      ],
      "signals": [
        {
          "name": "plan_review_approved_signal",
          "path": "${artifacts_dir}/plan_review.json",
          "json_path": "approved",
          "equals": true,
          "context_key": "plan_review_approved"
        }
      ]
    },
    {
      "id": "implement_features",
      "type": "parallel_agents",
      "condition": "plan_review_approved",
      "agent": "coding_agent",
      "items_from": "tasks.json",
      "max_parallel": 4,
      "contracts": [
        {
          "name": "implementation_source_handoff",
          "path": "${artifacts_dir}/implement_features_source_handoff.json",
          "kind": "file_exists"
        }
      ]
    },
    {
      "id": "run_tests",
      "type": "program",
      "command": "bash programs/run_tests.sh ${run_id} ${validation_dir}",
      "contracts": [
        {
          "name": "test_results",
          "path": "${validation_dir}/test_results.json",
          "kind": "json_schema",
          "schema_name": "TestResults"
        }
      ],
      "signals": [
        {
          "name": "test_failure_signal",
          "path": "${validation_dir}/test_results.json",
          "json_path": "overall_result",
          "equals": "fail",
          "context_key": "test_failure"
        }
      ]
    },
    {
      "id": "fix_errors",
      "type": "agent",
      "condition": "test_failure",
      "agent": "debugging_agent",
      "contracts": [
        {
          "name": "repair_tasks",
          "path": "${artifacts_dir}/repair_tasks.json",
          "kind": "json_schema",
          "schema_name": "TaskList"
        }
      ]
    },
    {
      "id": "apply_fixes",
      "type": "parallel_agents",
      "condition": "test_failure",
      "agent": "coding_agent",
      "items_from": "repair_tasks.json",
      "max_parallel": 1,
      "contracts": [
        {
          "name": "applied_fix_results",
          "path": "${artifacts_dir}/apply_fixes_output.json",
          "kind": "file_exists"
        },
        {
          "name": "applied_fix_source_handoff",
          "path": "${artifacts_dir}/apply_fixes_source_handoff.json",
          "kind": "file_exists"
        }
      ]
    },
    {
      "id": "rerun_tests",
      "type": "program",
      "condition": "test_failure",
      "command": "bash programs/run_tests.sh ${run_id} ${validation_dir}",
      "contracts": [
        {
          "name": "rerun_test_results",
          "path": "${validation_dir}/test_results.json",
          "kind": "json_schema",
          "schema_name": "TestResults"
        }
      ],
      "signals": [
        {
          "name": "persistent_test_failure_signal",
          "path": "${validation_dir}/test_results.json",
          "json_path": "overall_result",
          "equals": "fail",
          "context_key": "persistent_test_failure"
        }
      ]
    },
    {
      "id": "request_validation_review",
      "type": "approval",
      "condition": "persistent_test_failure",
      "message": "Validation still failing after one automated repair attempt. Human review required."
    },
    {
      "id": "learn_from_run",
      "type": "agent",
      "agent": "learning_agent"
    }
  ]
}
