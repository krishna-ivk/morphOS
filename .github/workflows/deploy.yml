name: Deploy morphOS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    name: Build & Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest ruff

    - name: Run tests
      run: pytest tests/ -v

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Build Docker Image
      run: |
        TAG="${{ github.ref_name == 'main' && github.sha || github.ref_name }}"
        docker build -t "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/skyforce-images/morphos:${TAG}" .

    - name: Push Docker Image
      run: |
        TAG="${{ github.ref_name == 'main' && github.sha || github.ref_name }}"
        docker push "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/skyforce-images/morphos:${TAG}"

    - name: Deploy to Cloud Run
      run: |
        TAG="${{ github.ref_name == 'main' && github.sha || github.ref_name }}"
        gcloud run deploy morphos \
          --image "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/skyforce-images/morphos:${TAG}" \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --port 8000

    - name: Run Post-Deploy Health Check
      run: |
        SERVICE_URL=$(gcloud run services describe morphos --region us-central1 --format "value(status.url)")
        echo "Checking health at ${SERVICE_URL}"
        for i in 1 2 3 4 5; do
          if curl -sf "${SERVICE_URL}"; then
            echo "Health check passed"
            exit 0
          fi
          echo "Attempt $i failed, retrying..."
          sleep 10
        done
        echo "Health check failed after 5 attempts"
        exit 1
